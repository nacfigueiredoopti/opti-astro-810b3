<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 50" fill="none">
  <!-- Rabobank Logo Mark -->
  <g transform="translate(0, 5)">
    <!-- Orange Circle -->
    <circle cx="20" cy="20" r="18" fill="#FF6600"/>
    <!-- Stylized person/compass mark in white -->
    <path d="M20 6 L20 14 M14 20 L26 20 M20 26 L20 34" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="20" cy="20" r="8" stroke="white" stroke-width="1.5" fill="none"/>
    <!-- Person silhouette -->
    <circle cx="20" cy="9" r="3" fill="#003082"/>
    <path d="M15 18 Q20 13 25 18" fill="#003082"/>
  </g>
  <!-- Rabobank Text -->
  <text x="48" y="35" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#003082" letter-spacing="-0.5">Rabobank</text>
</svg>
